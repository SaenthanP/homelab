apiVersion: argoproj.io/v1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: homelab
  source:
    repoURL: https://github.com/SaenthanP/homelab
    targetRevision: HEAD
    path: infrastructure/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true